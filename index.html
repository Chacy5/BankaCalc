<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>POS</title>
  <style>
    :root{
      --bg:#0b0c10;
      --card:#111318;
      --card2:#0f1116;
      --line:#2a2f3a;
      --text:#f5f7fb;
      --muted:#aeb6c5;

      /* logo-ish colors */
      --beer:#f4b400;      /* yellow */
      --beer2:#ffcc33;     /* lighter yellow */
      --black:#0c0d10;
      --danger:#ff5c5c;
      --ok:#41e6c6;
    }

    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text);padding:14px}

    .topbar{
      max-width:1380px;margin:0 auto 12px auto;
      background:linear-gradient(90deg, rgba(244,180,0,.18), rgba(0,0,0,0));
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .brand{display:flex;align-items:center;gap:10px}
    .brand img{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#fff}
    .brandName{
      font-weight:1000;letter-spacing:.2px;
      display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
    }
    .brandName .city{
      font-size:18px;
      color:var(--beer2);
      cursor:pointer;
      border-bottom:1px dashed rgba(255,204,51,.4);
    }
    .brandName .hint{font-size:12px;color:var(--muted);font-weight:700}

    .wrap{max-width:1380px;margin:0 auto;display:grid;grid-template-columns: 1.15fr .85fr;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px}
    h1{font-size:16px;margin:0 0 10px 0;font-weight:1000}
    h2{font-size:13px;margin:12px 0 8px 0;color:var(--muted);font-weight:1000}

    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    input, button{
      background:var(--card2);color:var(--text);
      border:1px solid var(--line);border-radius:14px;padding:12px 12px;outline:none;
      font-size:15px;
    }
    input:focus{border-color:rgba(255,204,51,.9);box-shadow:0 0 0 3px rgba(244,180,0,.12)}
    button{cursor:pointer;user-select:none}
    button.primary{border-color:rgba(244,180,0,.8);background:rgba(244,180,0,.16)}
    button.primary:hover{background:rgba(244,180,0,.22)}
    button.ghost{background:transparent}
    button.danger{border-color:rgba(255,92,92,.55);background:rgba(255,92,92,.14)}
    button.danger:hover{background:rgba(255,92,92,.22)}
    button.ok{border-color:rgba(65,230,198,.6);background:rgba(65,230,198,.12)}
    button.ok:hover{background:rgba(65,230,198,.18)}

    .muted{color:var(--muted);font-size:12px}
    .badge{color:var(--beer2);font-weight:1000}
    .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--muted);font-size:12px}
    .hr{height:1px;background:var(--line);margin:12px 0}

    .searchBox{position:relative;flex:1;min-width:280px}
    .suggest{
      position:absolute;left:0;right:0;top:52px;background:var(--card2);border:1px solid var(--line);
      border-radius:14px;overflow:hidden;display:none;max-height:360px;overflow:auto;z-index:20
    }
    .suggest button{
      width:100%;text-align:left;background:transparent;border:0;border-bottom:1px solid var(--line);
      padding:12px 12px;border-radius:0;font-size:15px
    }
    .suggest button:last-child{border-bottom:0}
    .suggest button:hover,.suggest button.active{background:rgba(244,180,0,.10)}
    .priceTag{color:var(--beer2);font-weight:1000}

    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;font-size:14px;vertical-align:middle}
    th{color:var(--muted);font-weight:1000;font-size:12px}
    .right{text-align:right}

    .qty{display:flex;align-items:center;gap:8px;justify-content:flex-end}
    .qty button{padding:10px 12px;border-radius:12px;font-size:16px;min-width:44px}
    .qty input{width:96px;text-align:right;padding:10px 10px;border-radius:12px;font-size:15px}
    .unit{min-width:26px;text-align:left}

    .footerTotal{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
    .total{font-size:22px;font-weight:1100}

    .gridBtns{display:flex;gap:10px;flex-wrap:wrap}
    .gridBtns button{min-width:160px}

    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .tab{padding:10px 12px;border-radius:999px}
    .tab.active{border-color:rgba(244,180,0,.8);background:rgba(244,180,0,.12)}
    .catBar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 10px}
    .catBtn{padding:10px 12px;border-radius:999px;white-space:nowrap}
    .catBtn.active{border-color:rgba(244,180,0,.8);background:rgba(244,180,0,.12)}
    .subWrap{display:flex;gap:8px;flex-wrap:wrap;width:100%;margin-top:6px}

    .quickGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .qbtn{padding:12px 12px;border-radius:14px;text-align:left}
    .qbtn .name{font-weight:1000;font-size:15px}
    .qbtn .meta{font-size:12px;color:var(--muted);margin-top:4px}

    .stopList{display:flex;flex-direction:column;gap:8px}
    .stopItem{border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:var(--card2)}
    .stopItem .title{font-weight:1000}
    .stopItem .meta{font-size:12px;color:var(--muted);margin-top:4px}

    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
      .quickGrid{grid-template-columns:1fr}
      .gridBtns button{min-width:140px}
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="logo" />
      <div class="brandName">
        <div class="city" id="cityName">Batumi</div>
        <div class="hint">(кликни, чтобы поменять город)</div>
      </div>
    </div>
    <div class="row" style="gap:8px">
      <span class="pill">Статус: <span id="syncStatus" class="badge">…</span></span>
      <span class="pill">Оплата: <span id="payModeLabel" class="badge">Наличные</span></span>
    </div>
  </div>

  <div class="wrap">
    <!-- LEFT -->
    <div class="card">
      <h1>Касса</h1>

      <div class="row">
        <div class="searchBox">
          <input id="search" type="text" autocomplete="off"
                 placeholder="Поиск: «бут», «кран 7», «вобла», «квас»…"
                 style="width:100%" />
          <div id="suggest" class="suggest"></div>
        </div>

        <div class="row" style="gap:8px">
          <button id="qtyMinus" class="ghost" type="button">−</button>
          <input id="qtyAdd" type="number" step="0.5" min="0" value="1"
                 style="width:90px;text-align:right" inputmode="decimal" />
          <button id="qtyPlus" class="ghost" type="button">+</button>
        </div>

        <button id="addBtn" class="primary" type="button">Добавить</button>
      </div>

      <h2>Чек</h2>
      <table>
        <thead>
          <tr>
            <th>Позиция</th>
            <th class="right">Цена</th>
            <th class="right">Кол-во</th>
            <th class="right">Сумма</th>
            <th class="right">×</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>

      <div class="footerTotal">
        <div class="muted">Позиций: <span id="itemsCount" class="badge">0</span></div>
        <div class="total">Итого: <span id="grandTotal">0</span> GEL</div>
      </div>

      <div class="muted" style="margin-top:6px">
        Скидка покупателю: <span id="discountLabel" class="badge">0%</span> ·
        Скидка сотруднику: <span id="discountEmpLabel" class="badge">0%</span>
      </div>

      <div class="gridBtns" style="margin-top:12px">
        <button id="cashBtn" class="primary" type="button">Наличные</button>
        <button id="cardBtn" class="ghost" type="button">Карта</button>
        <button id="deliveryBtn" class="ghost" type="button">Доставка</button>
        <button id="corpBtn" class="ok" type="button">Корпоративная</button>
      </div>

      <div class="gridBtns" style="margin-top:10px">
        <button id="discountBtn" class="ghost" type="button">Скидка</button>
        <button id="discountEmpBtn" class="ghost" type="button">Скидка сотруднику</button>
        <button id="discountClearBtn" class="ghost" type="button">Сброс скидок</button>
        <button id="copyBtn" class="ghost" type="button">Копировать чек</button>
        <button id="clearBtn" class="danger" type="button">Очистить</button>
      </div>

      <div class="gridBtns" style="margin-top:10px">
        <button id="closeShiftBtn" class="primary" type="button">Закрыть смену</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 style="margin:0">Меню / На стопе</h2>
        <button id="refreshBtn" class="ghost" type="button">Обновить</button>
      </div>

      <div class="tabs" style="margin-top:10px">
        <button class="tab active" data-tab="menu" type="button">Меню</button>
        <button class="tab" data-tab="stop" type="button">На стопе (<span id="stopCount">0</span>)</button>
      </div>

      <div id="menuTab">
        <div id="catBar" class="catBar"></div>
        <div id="subBar" class="subWrap" style="display:none"></div>

        <h2>Быстро добавить</h2>
        <div id="quickGrid" class="quickGrid"></div>
      </div>

      <div id="stopTab" style="display:none">
        <div id="stopCatBar" class="catBar"></div>
        <div id="stopSubBar" class="subWrap" style="display:none"></div>

        <h2>Список “на стопе”</h2>
        <div id="stopList" class="stopList"></div>
      </div>

      <div class="hr"></div>
      <div class="muted">Категории берутся строго из столбца <b>cat</b> в Google Sheets.</div>
    </div>
  </div>

  <script>
    /**********************
     * CONFIG
     **********************/
    const API_URL   = "https://script.google.com/macros/s/AKfycbyMIkxbquEtfNuFOYyiib-vfAEL0u6x-tccPDOqf0UVlxiZj-BF_p4PQc88CXhcsMvE/exec";
    const API_TOKEN = "p0s_9uF2kQ7mX1aV3zT8rH6nL4cY0sD5wB2";

    /**********************
     * Categories
     **********************/
    const MAIN_CATS = ["Все","Краны","Тара","Бутылки/Банки","Рыба","Снеки","Мясо","Чипсы"];
    const BOTTLE_SUB = ["Медовухи","Безалкогольные","IPA/APA","Классика","Темное","Пшеничка","Sour/Gose"];
    const SUB_SET = new Set(BOTTLE_SUB.map(x=>x.toLowerCase()));

    /**********************
     * Corporate
     **********************/
    const EMPLOYEES = ["Ви","Виталий","Зура","Джули"];
    let corporateEmployee = "";

    /**********************
     * Discounts (%)
     **********************/
    let discountPercent = 0;         // customer (cash/card/delivery)
    let employeeDiscountPercent = 0; // employee (corporate only)

    /**********************
     * Helpers
     **********************/
    function money(n){
      const x = Math.round((Number(n)||0)*100)/100;
      return x.toLocaleString("ru-RU",{minimumFractionDigits:0,maximumFractionDigits:2});
    }
    function normalize(s){ return String(s||"").toLowerCase().replaceAll("ё","е").trim(); }
    function esc(s){
      return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#039;");
    }
    function uuid(){
      return (crypto.randomUUID && crypto.randomUUID()) || (Date.now()+"-"+Math.random().toString(16).slice(2));
    }
    function parseNum(x){
      if (x===null || x===undefined) return NaN;
      return Number(String(x).replace(",", ".").trim());
    }

    // номер крана для сортировки
    function tapNumber(name){
      const m = String(name||"").match(/кран\s*(\d+)/i);
      return m ? Number(m[1]) : 9999;
    }
    function sortProducts(a,b){
      if (a.mainCat==="Краны" && b.mainCat==="Краны"){
        return tapNumber(a.name) - tapNumber(b.name);
      }
      return a.name.localeCompare(b.name, "ru");
    }

    async function apiPost(body){
      const res = await fetch(`${API_URL}?token=${encodeURIComponent(API_TOKEN)}`, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");
      return data;
    }
    async function apiGet(path){
      const url = `${API_URL}?path=${encodeURIComponent(path)}&token=${encodeURIComponent(API_TOKEN)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API error");
      return data;
    }

    /**********************
     * DOM
     **********************/
    const el = {
      cityName: document.getElementById("cityName"),

      search: document.getElementById("search"),
      suggest: document.getElementById("suggest"),
      qtyAdd: document.getElementById("qtyAdd"),
      qtyMinus: document.getElementById("qtyMinus"),
      qtyPlus: document.getElementById("qtyPlus"),
      addBtn: document.getElementById("addBtn"),

      cartBody: document.getElementById("cartBody"),
      itemsCount: document.getElementById("itemsCount"),
      grandTotal: document.getElementById("grandTotal"),
      syncStatus: document.getElementById("syncStatus"),
      payModeLabel: document.getElementById("payModeLabel"),

      discountLabel: document.getElementById("discountLabel"),
      discountEmpLabel: document.getElementById("discountEmpLabel"),

      cashBtn: document.getElementById("cashBtn"),
      cardBtn: document.getElementById("cardBtn"),
      deliveryBtn: document.getElementById("deliveryBtn"),
      corpBtn: document.getElementById("corpBtn"),

      discountBtn: document.getElementById("discountBtn"),
      discountEmpBtn: document.getElementById("discountEmpBtn"),
      discountClearBtn: document.getElementById("discountClearBtn"),

      copyBtn: document.getElementById("copyBtn"),
      clearBtn: document.getElementById("clearBtn"),
      closeShiftBtn: document.getElementById("closeShiftBtn"),

      refreshBtn: document.getElementById("refreshBtn"),
      menuTab: document.getElementById("menuTab"),
      stopTab: document.getElementById("stopTab"),
      catBar: document.getElementById("catBar"),
      subBar: document.getElementById("subBar"),
      quickGrid: document.getElementById("quickGrid"),
      stopCount: document.getElementById("stopCount"),
      stopCatBar: document.getElementById("stopCatBar"),
      stopSubBar: document.getElementById("stopSubBar"),
      stopList: document.getElementById("stopList"),
    };

    /**********************
     * State
     **********************/
    let state = null;
    let catalog = [];
    let stopSet = new Set();

    let paymentMethod = "cash"; // cash | card | delivery | corporate
    let cart = [];

    let suggestItems = [];
    let activeSuggestIndex = -1;

    let catFilter = "Все";
    let bottleSub = "IPA/APA";
    let stopCatFilter = "Все";
    let stopBottleSub = "IPA/APA";

    /**********************
     * Category mapping (ONLY from sheet cat)
     **********************/
    function mapCategoryFromSheet(p){
      const raw = String(p.cat || "").trim();
      const lower = raw.toLowerCase();

      if (MAIN_CATS.includes(raw) && raw !== "Все") {
        if (raw === "Бутылки/Банки") return { main: "Бутылки/Банки", sub: "Классика" };
        return { main: raw, sub: "" };
      }

      if (SUB_SET.has(lower)) {
        const real = BOTTLE_SUB.find(x => x.toLowerCase() === lower) || raw;
        return { main: "Бутылки/Банки", sub: real };
      }

      if (BOTTLE_SUB.includes(raw)) return { main:"Бутылки/Банки", sub: raw };

      // fallback (если в таблице написали что-то другое)
      return { main: "Снеки", sub: "" };
    }

    function withMapped(p){
      const m = mapCategoryFromSheet(p);
      return { ...p, mainCat: m.main, subCat: m.sub || "" };
    }

    function passesFilter(p, main, sub){
      if (main === "Все") return true;
      if (p.mainCat !== main) return false;
      if (main === "Бутылки/Банки") return (p.subCat || "Классика") === sub;
      return true;
    }

    function isAvailable(p){ return !stopSet.has(p.id); }
    function findById(id){ return catalog.find(p=>p.id===id) || null; }

    /**********************
     * Apply state
     **********************/
    function applyStateToUI(newState){
      state = newState;
      catalog = (state.products || []).map(p => withMapped({
        id: String(p.id),
        name: p.name,
        cat: p.cat,
        type: p.type || "unit",
        price: Number(p.price||0),
        deliveryPrice: (p.deliveryPrice==="" || p.deliveryPrice==null) ? "" : Number(p.deliveryPrice||0),
        track: p.track || "count"
      }));

      stopSet = new Set(state.stopIds || []);
      el.stopCount.textContent = String(stopSet.size);
      el.syncStatus.textContent = "OK";

      renderMenuCats();
      renderStopCats();
      renderQuick();
      renderStopList();
      renderCart();
    }

    async function refreshState(){
      el.syncStatus.textContent = "…";
      const data = await apiGet("state");
      applyStateToUI(data);
    }

    /**********************
     * Payment / Prices
     **********************/
    function setPayment(method){
      paymentMethod = method;

      const label =
        method==="cash" ? "Наличные" :
        method==="card" ? "Карта" :
        method==="delivery" ? "Доставка" :
        "Корпоративная";
      el.payModeLabel.textContent = label;

      // UI active states
      const setBtn = (btn, on, clsOn="primary")=>{
        btn.classList.toggle(clsOn, on);
        btn.classList.toggle("ghost", !on);
      };
      setBtn(el.cashBtn, method==="cash");
      setBtn(el.cardBtn, method==="card");
      setBtn(el.deliveryBtn, method==="delivery");
      // corporate у нас зеленым (ok)
      el.corpBtn.classList.toggle("ok", true);
      el.corpBtn.classList.toggle("primary", false);

      renderCart();
    }

    function unitPriceFor(item){
      if (paymentMethod === "delivery"){
        const dp = item.deliveryPrice;
        if (dp !== "" && dp !== null && dp !== undefined && Number.isFinite(Number(dp)) && Number(dp) > 0) return Number(dp);
      }
      return item.price;
    }

    function lineSum(item){
      return Math.round(unitPriceFor(item) * item.qtyPricing * 100) / 100;
    }

    function grossTotal(){
      return Math.round(cart.reduce((s,it)=>s+lineSum(it),0)*100)/100;
    }

    function discountAmount(){
      const g = grossTotal();
      let pct = (paymentMethod === "corporate") ? employeeDiscountPercent : discountPercent;
      pct = Number(pct||0);
      if (!Number.isFinite(pct) || pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      const d = g * (pct/100);
      return Math.round(d*100)/100;
    }

    function netTotal(){
      const n = grossTotal() - discountAmount();
      return Math.round(Math.max(0, n)*100)/100;
    }

    function payableTotal(){
      return (paymentMethod === "corporate") ? 0 : netTotal();
    }

    /**********************
     * QtyAdd behavior
     **********************/
    function getQtyAdd(){
      const v = parseNum(el.qtyAdd.value);
      if (!Number.isFinite(v) || v <= 0) return 1;
      return v;
    }

    function bestMatchFromInput(){
      const t = normalize(el.search.value);
      if (!t) return null;

      const pool = catalog.filter(isAvailable).filter(p=>passesFilter(p, catFilter, bottleSub));
      const exact = pool.find(p=>normalize(p.name)===t);
      if (exact) return exact;
      return suggestItems[0] || null;
    }

    function stepForProduct(p){
      if (!p) return 1;
      if (p.type==="per_kg" || p.track==="grams") return 50; // grams
      if (p.type==="per_liter" || p.track==="liters" || p.track==="keg") return 0.5; // liters
      return 1; // pcs
    }

    function adjustQtyAdd(dir){
      const p = bestMatchFromInput();
      const step = stepForProduct(p);
      let v = getQtyAdd();

      if (step === 0.5){
        v = Math.max(0.5, Math.round((v + dir*0.5)*10)/10);
      } else if (step === 50){
        v = Math.max(1, Math.round(v + dir*50));
      } else {
        v = Math.max(1, Math.round(v + dir));
      }
      el.qtyAdd.value = String(v);
    }

    /**********************
     * Cart logic
     **********************/
    function interpretQtyForProduct(p, qtyValue){
      if (p.type==="per_kg" || p.track==="grams"){
        const grams = Math.max(1, Math.round(qtyValue));
        return { displayQty: grams, displayUnit:"г", trackQty: grams, qtyPricing: grams/1000 };
      }
      if (p.type==="per_liter" || p.track==="liters" || p.track==="keg"){
        const liters = Math.max(0.5, Math.round(qtyValue*10)/10);
        return { displayQty: liters, displayUnit:"л", trackQty: liters, qtyPricing: liters };
      }
      const pcs = Math.max(1, Math.round(qtyValue));
      return { displayQty: pcs, displayUnit:"шт", trackQty: pcs, qtyPricing: pcs };
    }

    function addToCart(p, qtyValue){
      const q = interpretQtyForProduct(p, qtyValue);

      const existing = cart.find(x => x.productId===p.id && x.displayUnit===q.displayUnit);
      if (existing){
        existing.trackQty = Math.round((existing.trackQty + q.trackQty)*100)/100;
        existing.qtyPricing = Math.round((existing.qtyPricing + q.qtyPricing)*100)/100;
        existing.displayQty = (existing.displayUnit==="г") ? Math.round(existing.trackQty) : existing.trackQty;
      } else {
        cart.push({
          productId: p.id,
          name: p.name,
          mainCat: p.mainCat,
          subCat: p.subCat,
          type: p.type,
          track: p.track,
          price: p.price,
          deliveryPrice: p.deliveryPrice,
          trackQty: q.trackQty,
          qtyPricing: q.qtyPricing,
          displayQty: q.displayQty,
          displayUnit: q.displayUnit
        });
      }
      renderCart();
    }

    function adjustItem(idx, dir){
      const it = cart[idx]; if (!it) return;

      if (it.displayUnit === "г"){
        const newG = Math.max(1, Math.round(Number(it.displayQty) + dir*50));
        it.displayQty = newG; it.trackQty = newG; it.qtyPricing = newG/1000;
      } else if (it.displayUnit === "л"){
        const newL = Math.max(0.5, Math.round((Number(it.displayQty) + dir*0.5)*10)/10);
        it.displayQty = newL; it.trackQty = newL; it.qtyPricing = newL;
      } else {
        const newPcs = Math.max(1, Math.round(Number(it.displayQty) + dir));
        it.displayQty = newPcs; it.trackQty = newPcs; it.qtyPricing = newPcs;
      }
      renderCart();
    }

    function setItemQtyFromInput(idx, value){
      const it = cart[idx]; if (!it) return;
      const v = parseNum(value);
      if (!Number.isFinite(v) || v <= 0) return;

      if (it.displayUnit==="г"){
        const grams = Math.max(1, Math.round(v));
        it.displayQty = grams; it.trackQty = grams; it.qtyPricing = grams/1000;
      } else if (it.displayUnit==="л"){
        const liters = Math.max(0.5, Math.round(v*10)/10);
        it.displayQty = liters; it.trackQty = liters; it.qtyPricing = liters;
      } else {
        const pcs = Math.max(1, Math.round(v));
        it.displayQty = pcs; it.trackQty = pcs; it.qtyPricing = pcs;
      }
      renderCart();
    }

    function renderCart(){
      el.cartBody.innerHTML = cart.map((it, idx)=>{
        const suffix = it.type==="per_liter" ? " /л" : (it.type==="per_kg" ? " /кг" : "");
        const sum = Math.round(unitPriceFor(it) * it.qtyPricing * 100)/100;
        const showPrice = unitPriceFor(it);

        return `<tr>
          <td>
            <div style="font-weight:1000">${esc(it.name)}</div>
            <div class="muted">${esc(it.mainCat)}${it.mainCat==="Бутылки/Банки" ? " · "+esc(it.subCat) : ""}</div>
          </td>
          <td class="right"><span class="priceTag">${money(showPrice)}${suffix}</span></td>
          <td class="right">
            <div class="qty">
              <button type="button" data-act="dec" data-i="${idx}">−</button>
              <input type="number" step="0.1" inputmode="decimal" value="${esc(it.displayQty)}" data-act="qty" data-i="${idx}" />
              <button type="button" data-act="inc" data-i="${idx}">+</button>
              <span class="muted unit">${esc(it.displayUnit)}</span>
            </div>
          </td>
          <td class="right"><b>${money(sum)}</b></td>
          <td class="right"><button class="danger" type="button" data-act="del" data-i="${idx}">×</button></td>
        </tr>`;
      }).join("");

      el.itemsCount.textContent = String(cart.length);
      el.discountLabel.textContent = `${Math.round((discountPercent||0)*100)/100}%`;
      el.discountEmpLabel.textContent = `${Math.round((employeeDiscountPercent||0)*100)/100}%`;
      el.grandTotal.textContent = money(payableTotal());
    }

    /**********************
     * Suggest
     **********************/
    function showSuggest(items){
      suggestItems = items;
      activeSuggestIndex = items.length ? 0 : -1;

      if (!items.length){
        el.suggest.style.display="none";
        el.suggest.innerHTML="";
        return;
      }

      el.suggest.innerHTML = items.map((p,i)=>{
        const suffix = p.type==="per_liter" ? " /л" : (p.type==="per_kg" ? " /кг" : "");
        return `<button type="button" data-idx="${i}" class="${i===activeSuggestIndex?"active":""}">
          <span class="muted">${esc(p.mainCat)}${p.mainCat==="Бутылки/Банки" ? " · "+esc(p.subCat) : ""} ·</span>
          ${esc(p.name)}
          <span class="priceTag">· ${money(p.price)}${suffix}</span>
        </button>`;
      }).join("");

      el.suggest.style.display="block";
    }

    function updateActiveSuggest(){
      const btns = [...el.suggest.querySelectorAll("button")];
      btns.forEach((b,i)=>b.classList.toggle("active", i===activeSuggestIndex));
      const a = btns[activeSuggestIndex];
      if (a) a.scrollIntoView({block:"nearest"});
    }

    function hideSuggest(){
      el.suggest.style.display="none";
      el.suggest.innerHTML="";
      suggestItems=[];
      activeSuggestIndex=-1;
    }

    function suggest(query){
      const q = normalize(query);
      if (!q) return [];

      const pool = catalog
        .filter(isAvailable)
        .filter(p=>passesFilter(p, catFilter, bottleSub));

      const scored = pool.map(p=>{
        const n = normalize(p.name);
        let s = 0;
        if (n.startsWith(q)) s = 3;
        else if (n.includes(q)) s = 2;
        return {p,s};
      }).filter(x=>x.s>0)
        .sort((a,b)=> b.s-a.s || sortProducts(a.p, b.p))
        .slice(0, 14)
        .map(x=>x.p);

      return scored;
    }

    /**********************
     * Categories UI
     **********************/
    function availableFiltered(){
      return catalog.filter(isAvailable).filter(p=>passesFilter(p, catFilter, bottleSub));
    }

    function stoppedFiltered(){
      return catalog.filter(p=>stopSet.has(p.id)).filter(p=>passesFilter(p, stopCatFilter, stopBottleSub));
    }

    function renderMenuCats(){
      el.catBar.innerHTML = MAIN_CATS.map(c =>
        `<button class="catBtn ${c===catFilter?"active":""}" data-cat="${esc(c)}" type="button">${esc(c)}</button>`
      ).join("");

      if (catFilter === "Бутылки/Банки"){
        el.subBar.style.display = "flex";
        el.subBar.innerHTML = BOTTLE_SUB.map(s =>
          `<button class="catBtn ${s===bottleSub?"active":""}" data-sub="${esc(s)}" type="button">${esc(s)}</button>`
        ).join("");
      } else {
        el.subBar.style.display = "none";
        el.subBar.innerHTML = "";
      }
    }

    function renderStopCats(){
      el.stopCatBar.innerHTML = MAIN_CATS.map(c =>
        `<button class="catBtn ${c===stopCatFilter?"active":""}" data-stopcat="${esc(c)}" type="button">${esc(c)}</button>`
      ).join("");

      if (stopCatFilter === "Бутылки/Банки"){
        el.stopSubBar.style.display = "flex";
        el.stopSubBar.innerHTML = BOTTLE_SUB.map(s =>
          `<button class="catBtn ${s===stopBottleSub?"active":""}" data-stopsub="${esc(s)}" type="button">${esc(s)}</button>`
        ).join("");
      } else {
        el.stopSubBar.style.display = "none";
        el.stopSubBar.innerHTML = "";
      }
    }

    function renderQuick(){
      let pool = availableFiltered().slice();
      pool.sort(sortProducts);
      pool = pool.slice(0, 24);

      el.quickGrid.innerHTML = pool.map(p=>{
        const suffix = p.type==="per_liter" ? " /л" : (p.type==="per_kg" ? " /кг" : "");
        return `<button class="ghost qbtn" data-qid="${p.id}" type="button">
          <div class="name">${esc(p.name)}</div>
          <div class="meta">${esc(p.mainCat)}${p.mainCat==="Бутылки/Банки" ? " · "+esc(p.subCat) : ""} · <span class="priceTag">${money(p.price)}${suffix}</span></div>
        </button>`;
      }).join("") || `<div class="muted">Нет доступных товаров в этой категории.</div>`;
    }

    function renderStopList(){
      const list = stoppedFiltered().slice();
      list.sort(sortProducts);

      if (!list.length){
        el.stopList.innerHTML = `<div class="muted">Сейчас ничего не на стопе 🎉</div>`;
        return;
      }

      el.stopList.innerHTML = list.map(p=>{
        let hint = "";
        if (p.track === "keg"){
          const k = (state && state.kegs && state.kegs[p.id]) || null;
          hint = k ? `Кега: ${k.remainingL}л, запас: ${k.spares}` : "Нет строки в Kegs";
        } else {
          const q = (state && state.stock && (p.id in state.stock)) ? state.stock[p.id] : 0;
          hint = `Остаток: ${q}`;
        }
        return `<div class="stopItem">
          <div class="title">${esc(p.name)}</div>
          <div class="meta">${esc(p.mainCat)}${p.mainCat==="Бутылки/Банки" ? " · "+esc(p.subCat) : ""} · ${esc(hint)}</div>
        </div>`;
      }).join("");
    }

    /**********************
     * Discounts UI
     **********************/
    function promptPercent(title, current){
      const ans = prompt(title, String(current ?? 0));
      if (ans === null) return null;
      let v = parseNum(ans);
      if (!Number.isFinite(v) || v < 0) v = 0;
      if (v > 100) v = 100;
      return Math.round(v*100)/100;
    }

    function setCustomerDiscount(){
      const v = promptPercent("Скидка покупателю (% 0–100):", discountPercent);
      if (v === null) return;
      discountPercent = v;
      renderCart();
    }

    function setEmployeeDiscount(){
      const v = promptPercent("Скидка сотруднику (% 0–100):", employeeDiscountPercent);
      if (v === null) return;
      employeeDiscountPercent = v;
      renderCart();
    }

    function clearDiscounts(){
      discountPercent = 0;
      employeeDiscountPercent = 0;
      renderCart();
    }

    /**********************
     * Copy / clear
     **********************/
    async function copyReceipt(){
      const lines = cart.map(it=>{
        const suffix = it.type==="per_liter" ? " /л" : (it.type==="per_kg" ? " /кг" : "");
        const qtyTxt = (it.displayUnit==="г") ? `${it.displayQty} г` : `${it.displayQty} ${it.displayUnit}`;
        const unit = unitPriceFor(it);
        return `${it.name} — ${qtyTxt} × ${money(unit)}${suffix} = ${money(Math.round(unit*it.qtyPricing*100)/100)} GEL`;
      });

      const g = grossTotal();
      const d = discountAmount();
      const n = netTotal();

      lines.push(`СУММА: ${money(g)} GEL`);
      if (d>0) lines.push(`СКИДКА: -${money(d)} GEL`);
      lines.push(`ИТОГО: ${money((paymentMethod==="corporate")?0:n)} GEL`);
      if (paymentMethod==="corporate") lines.push(`КОРПОРАТИВ: ${corporateEmployee} — ${money(n)} GEL`);

      const text = lines.join("\n");
      try{
        await navigator.clipboard.writeText(text);
        alert("Чек скопирован.");
      }catch{
        prompt("Скопируй вручную:", text);
      }
    }

    /**********************
     * Keg updated prompt handling
     **********************/
    function buildKegSwitchesFromServer(res){
      // Если сервер сообщил, что кега обновлена — спросим сколько налили из новой
      const switches = {};
      if (!res || !res.kegUpdated || !res.kegUpdated.length) return switches;

      for (const k of res.kegUpdated){
        const ans = prompt(`${k.name} — кега обновлена.\nСколько литров налито из новой кеги?`, "0");
        if (ans === null) continue;
        const v = parseNum(ans);
        if (Number.isFinite(v) && v > 0) switches[k.id] = Math.round(v*10)/10;
      }
      return switches;
    }

    /**********************
     * Pay
     **********************/
    async function pay(){
      if (!cart.length){
        alert("Чек пустой.");
        return;
      }

      const items = cart.map(it => ({
        productId: it.productId,
        qtyBase: it.trackQty,
        displayUnit: it.displayUnit,
        unitPriceUsed: unitPriceFor(it)
      }));

      const receiptId = uuid();
      const gross = grossTotal();
      const disc = discountAmount();
      const net = netTotal();

      // первая попытка без kegSwitches
      let payload = {
        path:"sale",
        receiptId,
        paymentMethod,
        employee: (paymentMethod==="corporate") ? corporateEmployee : "",
        grossTotal: gross,
        discountAmount: disc,
        netTotal: net,
        items,
        kegSwitches: {}
      };

      try{
        el.syncStatus.textContent = "…";
        let res = await apiPost(payload);

        // Если были обновления кег — перешлём одну доп.операцию с kegSwitches
        // (проще: повторяем sale с тем же receiptId НЕ будем — вместо этого сразу включаем kegSwitches)
        // Поэтому делаем так: если пришёл kegUpdated — сразу делаем второй POST с тем же receiptId и kegSwitches
        if (res.kegUpdated && res.kegUpdated.length){
          const switches = buildKegSwitchesFromServer(res);
          if (Object.keys(switches).length){
            payload.kegSwitches = switches;
            res = await apiPost(payload);
          }
        }

        // low warnings
        if (res.lowWarnings && res.lowWarnings.length){
          const lines = res.lowWarnings.map(x => `${x.name} осталось ${x.remaining} ${x.unit}. Отключите этот товар в доставке`);
          alert(lines.join("\n"));
        }

        applyStateToUI(res.state);

        const msg = (paymentMethod==="corporate")
          ? `Корпоративный — ${corporateEmployee}: ${money(net)} GEL`
          : `Пробито ✅ Сумма: ${money(net)} GEL`;

        cart = [];
        renderCart();
        alert(msg);

      }catch(err){
        el.syncStatus.textContent = "ERR";
        alert("Ошибка при пробитии: " + err);
      }
    }

    async function closeShift(){
      try{
        const data = await apiGet("shiftSummary");
        alert(
          `Смена за ${data.dayKey}\n\n` +
          `Наличные: ${money(data.cash)} GEL\n` +
          `Карта: ${money(data.card)} GEL\n` +
          `Доставка: ${money(data.delivery)} GEL\n` +
          `Корпоративный: ${money(data.corporate)} GEL\n\n` +
          `ИТОГО: ${money(data.total)} GEL\n` +
          `Чеков: ${data.count}`
        );
      }catch(err){
        alert("Ошибка закрытия смены: " + err);
      }
    }

    async function corporatePayFlow(){
      if (!cart.length){
        alert("Чек пустой.");
        return;
      }
      const name = prompt(`Кто взял? Введите имя:\n${EMPLOYEES.join(", ")}`, corporateEmployee || EMPLOYEES[0]);
      if (name === null) return;
      corporateEmployee = String(name).trim();
      if (!corporateEmployee){
        alert("Нужно имя сотрудника.");
        return;
      }
      setPayment("corporate");
      await pay();
    }

    /**********************
     * Tabs
     **********************/
    function setTab(t){
      document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active", b.dataset.tab===t));
      el.menuTab.style.display = (t==="menu") ? "" : "none";
      el.stopTab.style.display = (t==="stop") ? "" : "none";
      if (t==="stop") renderStopList();
    }

    /**********************
     * Events
     **********************/
    el.cityName.addEventListener("click", ()=>{
      const v = prompt("Название города:", el.cityName.textContent.trim());
      if (v !== null && String(v).trim()) el.cityName.textContent = String(v).trim();
    });

    el.search.addEventListener("input", ()=>{
      const items = suggest(el.search.value);
      showSuggest(items);
    });

    el.search.addEventListener("keydown", (e)=>{
      if (e.key==="Escape"){ hideSuggest(); return; }
      if (!suggestItems.length) return;

      if (e.key==="ArrowDown"){
        e.preventDefault();
        activeSuggestIndex = Math.min(suggestItems.length-1, activeSuggestIndex+1);
        updateActiveSuggest();
      } else if (e.key==="ArrowUp"){
        e.preventDefault();
        activeSuggestIndex = Math.max(0, activeSuggestIndex-1);
        updateActiveSuggest();
      } else if (e.key==="Enter"){
        e.preventDefault();
        const p = suggestItems[activeSuggestIndex] || bestMatchFromInput();
        if (!p) return;
        addToCart(p, getQtyAdd());
        hideSuggest();
      }
    });

    el.suggest.addEventListener("click", (e)=>{
      const btn = e.target.closest("button");
      if (!btn) return;
      const idx = Number(btn.dataset.idx);
      const p = suggestItems[idx];
      if (!p) return;
      el.search.value = p.name;
      hideSuggest();
      addToCart(p, getQtyAdd());
    });

    document.addEventListener("click", (e)=>{
      if (!e.target.closest(".searchBox")) hideSuggest();
    });

    el.qtyMinus.addEventListener("click", ()=>adjustQtyAdd(-1));
    el.qtyPlus.addEventListener("click", ()=>adjustQtyAdd(+1));

    el.addBtn.addEventListener("click", ()=>{
      const p = bestMatchFromInput();
      if (!p){
        alert("Не нашла товар (или он на стопе).");
        return;
      }
      addToCart(p, getQtyAdd());
      hideSuggest();
    });

    el.cartBody.addEventListener("click", (e)=>{
      const btn = e.target.closest("button");
      if (!btn) return;
      const act = btn.dataset.act;
      const idx = Number(btn.dataset.i);

      if (act==="del"){
        cart.splice(idx,1);
        renderCart();
      } else if (act==="inc"){
        adjustItem(idx, +1);
      } else if (act==="dec"){
        adjustItem(idx, -1);
      }
    });

    el.cartBody.addEventListener("change", (e)=>{
      const inp = e.target.closest('input[data-act="qty"]');
      if (!inp) return;
      const idx = Number(inp.dataset.i);
      setItemQtyFromInput(idx, inp.value);
    });

    // payment buttons = pay now
    el.cashBtn.addEventListener("click", async ()=>{ setPayment("cash"); await pay(); });
    el.cardBtn.addEventListener("click", async ()=>{ setPayment("card"); await pay(); });
    el.deliveryBtn.addEventListener("click", async ()=>{ setPayment("delivery"); await pay(); });
    el.corpBtn.addEventListener("click", corporatePayFlow);

    // discounts
    el.discountBtn.addEventListener("click", setCustomerDiscount);
    el.discountEmpBtn.addEventListener("click", setEmployeeDiscount);
    el.discountClearBtn.addEventListener("click", clearDiscounts);

    el.copyBtn.addEventListener("click", copyReceipt);
    el.clearBtn.addEventListener("click", ()=>{
      if (!cart.length) return;
      if (!confirm("Очистить чек?")) return;
      cart = [];
      renderCart();
    });

    el.closeShiftBtn.addEventListener("click", closeShift);
    el.refreshBtn.addEventListener("click", ()=>refreshState().catch(err=>alert("Ошибка: "+err)));

    document.querySelectorAll(".tab").forEach(b=>{
      b.addEventListener("click", ()=>setTab(b.dataset.tab));
    });

    el.catBar.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-cat]");
      if (!btn) return;
      catFilter = btn.dataset.cat;
      renderMenuCats();
      renderQuick();
    });
    el.subBar.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-sub]");
      if (!btn) return;
      bottleSub = btn.dataset.sub;
      renderMenuCats();
      renderQuick();
    });

    el.stopCatBar.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-stopcat]");
      if (!btn) return;
      stopCatFilter = btn.dataset.stopcat;
      renderStopCats();
      renderStopList();
    });
    el.stopSubBar.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-stopsub]");
      if (!btn) return;
      stopBottleSub = btn.dataset.stopsub;
      renderStopCats();
      renderStopList();
    });

    el.quickGrid.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-qid]");
      if (!btn) return;
      const id = btn.dataset.qid;
      const p = findById(id);
      if (!p || !isAvailable(p)) return;
      addToCart(p, getQtyAdd());
    });

    /**********************
     * Init
     **********************/
    function renderMenuCats(){
      el.catBar.innerHTML = MAIN_CATS.map(c =>
        `<button class="catBtn ${c===catFilter?"active":""}" data-cat="${esc(c)}" type="button">${esc(c)}</button>`
      ).join("");

      if (catFilter === "Бутылки/Банки"){
        el.subBar.style.display = "flex";
        el.subBar.innerHTML = BOTTLE_SUB.map(s =>
          `<button class="catBtn ${s===bottleSub?"active":""}" data-sub="${esc(s)}" type="button">${esc(s)}</button>`
        ).join("");
      } else {
        el.subBar.style.display = "none";
        el.subBar.innerHTML = "";
      }
    }

    function renderStopCats(){
      el.stopCatBar.innerHTML = MAIN_CATS.map(c =>
        `<button class="catBtn ${c===stopCatFilter?"active":""}" data-stopcat="${esc(c)}" type="button">${esc(c)}</button>`
      ).join("");

      if (stopCatFilter === "Бутылки/Банки"){
        el.stopSubBar.style.display = "flex";
        el.stopSubBar.innerHTML = BOTTLE_SUB.map(s =>
          `<button class="catBtn ${s===stopBottleSub?"active":""}" data-stopsub="${esc(s)}" type="button">${esc(s)}</button>`
        ).join("");
      } else {
        el.stopSubBar.style.display = "none";
        el.stopSubBar.innerHTML = "";
      }
    }

    (async ()=>{
      try{
        setPayment("cash");
        setTab("menu");
        renderMenuCats();
        renderStopCats();
        await refreshState();
      }catch(err){
        el.syncStatus.textContent = "ERR";
        alert("Не удалось подключиться к таблице. Проверь API_URL / TOKEN.\n\n"+err);
      }
    })();
  </script>
</body>
</html>
