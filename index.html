<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BANKA POS — выбор города</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="topbar" style="max-width:900px">
    <div class="brand">
      <div class="logoBox">B</div>
      <div>
        <div class="brandTitle">BANKA POS</div>
        <div class="brandSub">Выберите город</div>
      </div>
    </div>
  </div>

  <div class="wrap" style="max-width:900px">
    <div class="card">
      <div class="row" style="align-items:flex-end; gap:12px; flex-wrap:wrap">
        <div style="min-width:260px; flex:1">
          <div class="label">Город</div>
          <select id="citySelect" class="input">
            <option value="batumi">Батуми</option>
            <option value="minsk">Минск</option>
            <option value="brest">Брест</option>
          </select>
        </div>
        <button id="goBtn" class="btn primary" style="height:44px">Открыть</button>
      </div>

      <div class="hint" style="margin-top:10px">
        Последний выбранный город будет запоминаться в браузере.
      </div>
    </div>
  </div>

  <script>
    const map = {
      batumi: "./batumi.html",
      minsk: "./minsk.html",
      brest: "./brest.html",
    };

    const sel = document.getElementById("citySelect");
    const goBtn = document.getElementById("goBtn");

    const last = localStorage.getItem("banka_city") || "batumi";
    if (map[last]) sel.value = last;

    goBtn.addEventListener("click", () => {
      const v = sel.value;
      localStorage.setItem("banka_city", v);
      location.href = map[v] || map.batumi;
    });

    // быстрый Enter
    sel.addEventListener("keydown", (e) => {
      if (e.key === "Enter") goBtn.click();
    });
  </script>
</body>
</html>
